<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  {% include head.html %}
</head>
<body>
  {% include nav.html %}

  <main id="top">
    {{ content }}
  </main>

  {% include footer.html %}

  <script>
    // Mobile nav toggle
    (function () {
      var t = document.querySelector('.nav-toggle');
      if (!t) return;
      t.addEventListener('click', function () {
        var inner = t.closest('.nav-inner');
        var open = inner.classList.toggle('open');
        t.setAttribute('aria-expanded', open);
      });
    })();

    // Reveal on scroll
    (function () {
      var els = document.querySelectorAll('.reveal');
      if (!els.length) return;
      if (!('IntersectionObserver' in window) || window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        els.forEach(function (e) { e.classList.add('in'); });
        return;
      }
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
        });
      }, { threshold: 0.12 });
      els.forEach(function (e) { io.observe(e); });
    })();

    // Rotating footer quote
    (function () {
      var box = document.getElementById('footer-quote');
      if (!box || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      var quotes = [
        ['Simplicity is the ultimate sophistication.', 'Leonardo da Vinci'],
        ['The details are not the details. They make the design.', 'Charles Eames'],
        ['Make it work, make it right, make it fast.', 'Kent Beck'],
        ['Perfection is achieved when there is nothing left to take away.', 'Antoine de Saint-Exupéry'],
        ['Stay hungry, stay foolish.', 'Steve Jobs'],
        ['Programs must be written for people to read.', 'Harold Abelson'],
        ['The best way out is always through.', 'Robert Frost']
      ];
      var i = 0;
      var textEl = box.querySelector('.fq-text');
      var authEl = box.querySelector('.fq-author');
      setInterval(function () {
        box.classList.add('fading');
        setTimeout(function () {
          i = (i + 1) % quotes.length;
          textEl.textContent = quotes[i][0];
          authEl.textContent = quotes[i][1];
          box.classList.remove('fading');
        }, 500);
      }, 8000);
    })();
  </script>
</body>
</html>
